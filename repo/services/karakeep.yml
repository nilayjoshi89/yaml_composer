services:
  karakeep-app:
    image: ghcr.io/karakeep-app/karakeep:release
    container_name: karakeep-app
    restart: unless-stopped
    environment:
      - KARAKEEP_VERSION=release
      - DATA_DIR=/data
      - TZ=Asia/Singapore
      - NEXTAUTH_SECRET=${KARAKEEP_APP_SECRET:?}
      - MEILI_MASTER_KEY=${KARAKEEP_MEILI_SECRET:?}
      - NEXTAUTH_URL=http://localhost:8080
      - MEILI_ADDR=http://karakeep-meilisearch:7700
      - BROWSER_WEB_URL=http://karakeep-chrome:9222
    ports:
      - 8080:3000
    volumes:
      - ${KARAKEEP_DATA:?}\app-data:/data
    networks:
      - karakeep_network
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: "1.0"
  karakeep-chrome:
    image: gcr.io/zenika-hub/alpine-chrome:124
    container_name: karakeep-chrome
    command:
      - --no-sandbox
      - --disable-gpu
      - --disable-dev-shm-usage
      - --remote-debugging-address=0.0.0.0
      - --remote-debugging-port=9222
      - --hide-scrollbars
    restart: unless-stopped
    environment:
      - TZ=Asia/Singapore
    networks:
      - karakeep_network
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: "1.0"
  karakeep-meili:
    image: getmeili/meilisearch:v1.41.0
    container_name: karakeep-meilisearch
    restart: unless-stopped
    environment:
      - MEILI_NO_ANALYTICS=true
      - TZ=Asia/Singapore
      - MEILI_MASTER_KEY=${KARAKEEP_MEILI_SECRET:?}
    volumes:
      - ${KARAKEEP_DATA:?}\meili-data:/meili_data
    networks:
      - karakeep_network
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://localhost:7700/health || exit 1
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    pids_limit: 100
    mem_limit: 512m
    cpus: "1.0"
networks:
  karakeep_network:
    name: karakeep_network
